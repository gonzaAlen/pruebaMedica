<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva Consulta — María González</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --rosa:#FFB6D9;--rosa-light:#FFD6EC;--rosa-pale:#FFF0F7;--rosa-mid:#F590C4;
  --dorado:#D4AF37;--dorado-light:#E8D080;--dorado-pale:#FBF6E3;
  --negro:#1A1A1A;--negro-mid:#2E2E2E;
  --gris:#6B6B6B;--gris-light:#A8A8A8;--gris-bg:#F7F6F3;
  --blanco:#FFFFFF;--crema:#FDFAF6;--borde:#F0EBE3;--borde-gris:#E8E4DF;
  --mont:'Montserrat',sans-serif;--serif:'Cormorant Garamond',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--mont);background:var(--gris-bg);}

/* ── TOPBAR ── */
.topbar{
  background:var(--blanco);border-bottom:1px solid var(--borde);
  padding:0.85rem 2rem;
  display:flex;align-items:center;justify-content:center;
  position:sticky;top:0;z-index:50;
}
.back-btn{
  position:absolute;left:2rem;
  display:flex;align-items:center;gap:0.4rem;
  font-size:0.78rem;color:var(--gris);
  background:none;border:none;cursor:pointer;
  font-family:var(--mont);
  transition:color 0.2s;
  text-decoration:none;
}
.back-btn:hover{color:var(--negro);}
.topbar-title{font-size:0.9rem;font-weight:600;color:var(--negro);letter-spacing:0.02em;}
/* thin gold underline accent */
.topbar-title span{
  display:block;width:30px;height:1.5px;
  background:var(--dorado);margin:4px auto 0;
}

/* ── CONTENT ── */
.content{
  max-width:900px;margin:0 auto;
  padding:2rem 2rem 4rem;
}

/* Patient chip */
.patient-chip{
  display:flex;align-items:center;gap:1rem;
  background:var(--blanco);border:1px solid var(--borde);
  border-radius:10px;padding:1rem 1.25rem;
  margin-bottom:2rem;
}
.patient-chip-avatar{
  width:48px;height:48px;border-radius:50%;
  background:var(--rosa-pale);border:2px solid var(--rosa-light);
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;font-weight:600;color:var(--rosa-mid);
  flex-shrink:0;
}
.patient-chip-name{font-size:0.95rem;font-weight:600;color:var(--negro);}
.patient-chip-sub{font-size:0.72rem;color:var(--gris-light);margin-top:0.15rem;font-weight:300;}

/* Type selector */
.form-section{margin-bottom:2rem;}
.form-section-title{
  font-size:0.72rem;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--negro-mid);
  margin-bottom:0.85rem;
}

.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.tipo-option{
  display:flex;align-items:center;gap:0.85rem;
  padding:1rem 1.25rem;
  border:2px solid var(--borde);border-radius:8px;
  cursor:pointer;background:var(--blanco);
  transition:border-color 0.2s,background 0.2s;
  user-select:none;
}
.tipo-option:hover{border-color:var(--borde-gris);background:var(--crema);}
.tipo-option.selected-dorado{
  border-color:var(--dorado);
  background:var(--dorado-pale);
}
.tipo-option.selected-rosa{
  border-color:var(--rosa);
  background:var(--rosa-pale);
}
.tipo-icon{
  width:34px;height:34px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.tipo-icon-dorado{background:rgba(212,175,55,0.12);color:var(--dorado);}
.tipo-icon-rosa{background:rgba(255,182,217,0.2);color:var(--rosa-mid);}
.tipo-label{font-size:0.85rem;font-weight:600;color:var(--negro);}
.tipo-sub{font-size:0.7rem;color:var(--gris-light);font-weight:300;margin-top:0.1rem;}

/* Fields */
.fields-grid{display:flex;flex-direction:column;gap:1.1rem;}
.field{display:flex;flex-direction:column;gap:0.45rem;}
.field label{
  font-size:0.72rem;font-weight:600;
  color:var(--negro-mid);letter-spacing:0.06em;
}
.field input,.field textarea{
  padding:0.8rem 1rem;
  border:1.5px solid var(--borde);
  background:var(--crema);
  font-family:var(--mont);font-size:0.85rem;
  color:var(--negro);outline:none;border-radius:7px;
  transition:border-color 0.2s,box-shadow 0.2s;
  resize:none;
}
.field input:focus,.field textarea:focus{
  border-color:var(--dorado);
  box-shadow:0 0 0 3px rgba(212,175,55,0.1);
  background:var(--blanco);
}
.field input::placeholder,.field textarea::placeholder{color:var(--gris-light);}
.field textarea{height:90px;line-height:1.6;}

/* Upload */
.upload-zone{
  border:2px dashed var(--rosa-light);
  border-radius:10px;background:var(--rosa-pale);
  padding:2.5rem 1.5rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0.6rem;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
  min-height:120px;
}
.upload-zone:hover{border-color:var(--rosa);background:#fff5fa;}
.upload-icon{color:var(--rosa-mid);}
.upload-text{font-size:0.82rem;color:var(--gris);font-weight:300;}
.upload-text strong{color:var(--rosa-mid);font-weight:500;}

/* Photo previews */
.photo-previews{display:flex;gap:0.6rem;margin-top:0.85rem;flex-wrap:wrap;}
.photo-thumb{
  width:72px;height:72px;border-radius:8px;
  border:1.5px solid var(--borde);
  overflow:hidden;flex-shrink:0;
  position:relative;
}
.photo-thumb-inner{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}

/* Actions */
.form-actions{
  display:flex;align-items:center;justify-content:flex-end;
  gap:0.75rem;
  padding-top:1.5rem;
  border-top:1px solid var(--borde);
  margin-top:0.5rem;
}
.btn-cancel{
  padding:0.7rem 1.4rem;border:1.5px solid var(--borde);
  background:transparent;border-radius:7px;
  font-family:var(--mont);font-size:0.78rem;font-weight:500;
  color:var(--gris);cursor:pointer;
  transition:border-color 0.2s,color 0.2s;
}
.btn-cancel:hover{border-color:var(--gris);color:var(--negro);}
.btn-save{
  padding:0.7rem 1.75rem;background:var(--dorado);
  border:none;border-radius:7px;
  font-family:var(--mont);font-size:0.78rem;font-weight:600;
  color:var(--negro);cursor:pointer;
  letter-spacing:0.06em;
  transition:background 0.2s,transform 0.15s,box-shadow 0.2s;
}
.btn-save:hover{
  background:var(--dorado-light);
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(212,175,55,0.3);
}

/* Card wrapper */
.form-card{
  background:var(--blanco);border:1px solid var(--borde);
  border-radius:12px;padding:1.75rem 2rem;
  margin-bottom:1.25rem;
}
.form-card-title{
  font-size:0.82rem;font-weight:600;color:var(--negro);
  letter-spacing:0.02em;margin-bottom:1.25rem;
  padding-bottom:0.85rem;border-bottom:1px solid var(--borde);
  display:flex;align-items:center;gap:0.6rem;
}
.card-title-icon{color:var(--dorado);}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="4-detalle-paciente.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </a>
  <div class="topbar-title">
    Nueva Consulta
    <span></span>
  </div>
</div>

<div class="content">

  <!-- Patient chip -->
  <div class="patient-chip">
    <div class="patient-chip-avatar">MG</div>
    <div>
      <div class="patient-chip-name">María González</div>
      <div class="patient-chip-sub">Últimas consultas: 15 Mar 2024</div>
    </div>
  </div>

  <!-- Tipo de consulta -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Tipo de Consulta
    </div>
    <div class="tipo-grid">
      <div class="tipo-option selected-dorado" id="opt-clinica" onclick="selectTipo('clinica')">
        <div class="tipo-icon tipo-icon-dorado">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="1"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        </div>
        <div>
          <div class="tipo-label">Clínica General</div>
          <div class="tipo-sub">Historia clínica médica</div>
        </div>
      </div>
      <div class="tipo-option" id="opt-estetica" onclick="selectTipo('estetica')">
        <div class="tipo-icon tipo-icon-rosa">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div>
          <div class="tipo-label">Medicina Estética</div>
          <div class="tipo-sub">Tratamientos estéticos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Información de la consulta -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Información de la Consulta
    </div>
    <div class="fields-grid">
      <div class="field">
        <label>Motivo de Consulta</label>
        <input type="text" placeholder="Ej: Control periódico, brote de acné...">
      </div>
      <div class="field">
        <label>Diagnóstico</label>
        <input type="text" placeholder="Ej: Dermatitis alérgica, piel sensible...">
      </div>
      <div class="field">
        <label>Examen Físico</label>
        <textarea placeholder="Descripción del examen físico, observaciones relevantes..."></textarea>
      </div>
      <div class="field">
        <label>Tratamiento Indicado</label>
        <textarea placeholder="Medicación, procedimientos indicados, próximos pasos..."></textarea>
      </div>
    </div>
  </div>

  <!-- Fotos del procedimiento -->
  <div class="form-card">
    <div class="form-card-title">
      <svg class="card-title-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Fotos del Procedimiento
    </div>
    <div class="upload-zone" id="uploadZone">
      <svg class="upload-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p class="upload-text"><strong>Click para cargar fotos</strong></p>
      <p class="upload-text" style="font-size:0.72rem;color:var(--gris-light);">PNG, JPG hasta 10MB cada una</p>
    </div>
    <div class="photo-previews" id="photoPreviews">
      <!-- Thumbnails example -->
      <div class="photo-thumb">
        <div class="photo-thumb-inner" style="background:linear-gradient(135deg,#e8c4a0,#d4a080);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
      </div>
      <div class="photo-thumb">
        <div class="photo-thumb-inner" style="background:linear-gradient(135deg,#c4b080,#a89060);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button class="btn-cancel" onclick="window.location.href='4-detalle-paciente.html'">Cancelar</button>
    <button class="btn-save" onclick="window.location.href='4-detalle-paciente.html'">Guardar</button>
  </div>

</div>

<script>
function selectTipo(tipo){
  const clinica = document.getElementById('opt-clinica');
  const estetica = document.getElementById('opt-estetica');
  clinica.classList.remove('selected-dorado','selected-rosa');
  estetica.classList.remove('selected-dorado','selected-rosa');
  if(tipo==='clinica') clinica.classList.add('selected-dorado');
  else estetica.classList.add('selected-rosa');
}
</script>
</body>
</html>
